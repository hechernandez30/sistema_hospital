spring:
  config:
    activate:
      on-profile: dev

app:
  security:
    enabled: false
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:5173
      - http://127.0.0.1:4200
      - http://127.0.0.1:5173

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
