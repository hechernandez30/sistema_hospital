spring:
  config:
    import: optional:classpath:application-local.yml
  application:
    name: hospital-api
  datasource:
    url: jdbc:postgresql://localhost:5432/hospital
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: hospital
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: ${PORT:8080}

app:
  security:
    enabled: true
  mail:
    enabled: ${MAIL_ENABLED:false}
    from-name: ${MAIL_FROM_NAME:Hospital H&H}
    from-address: ${MAIL_FROM_ADDRESS:${MAIL_USERNAME:}}
  storage:
    type: local
    max-attachment-bytes: 10485760
    local:
      base-path: ./data/uploads
    azure:
      connection-string: ${AZURE_STORAGE_CONNECTION_STRING:}
      container-name: hospital-attachments
  jwt:
    # Mínimo 32 bytes UTF-8 para HS256; sustituir en producción (variable de entorno recomendada).
    secret: "desarrollo-local-clave-muy-larga-de-al-menos-32-bytes!!"
    expiration-minutes: 120
  cors:
    allowed-origins:
      - http://localhost:4200

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
