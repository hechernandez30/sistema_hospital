<h2 mat-dialog-title>{{ isEdit ? 'Editar rol' : 'Nuevo rol' }}</h2>
<mat-dialog-content>
  @if (loading) {
    <div class="loading">
      <mat-progress-spinner diameter="36" mode="indeterminate" />
    </div>
  } @else {
    <form [formGroup]="form" class="form">
      <mat-form-field appearance="outline" class="full">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="name" maxlength="50" />
        @if (form.controls.name.hasError('required') && form.controls.name.touched) {
          <mat-error>Requerido</mat-error>
        }
      </mat-form-field>
      <mat-form-field appearance="outline" class="full">
        <mat-label>Descripción</mat-label>
        <textarea matInput formControlName="description" rows="3" maxlength="200"></textarea>
      </mat-form-field>
    </form>
  }
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()" [disabled]="saving">Cancelar</button>
  <button mat-flat-button color="primary" type="button" (click)="submit()" [disabled]="loading || saving">
    @if (saving) {
      <span>Guardando…</span>
    } @else {
      Guardar
    }
  </button>
</mat-dialog-actions>
