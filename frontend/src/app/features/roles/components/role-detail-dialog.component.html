<h2 mat-dialog-title>
  <mat-icon class="title-icon">admin_panel_settings</mat-icon>
  Rol #{{ data.id }}
</h2>
<mat-dialog-content class="detail">
  <div class="field"><span class="label">Nombre</span><span class="value">{{ data.name }}</span></div>
  <div class="field full"><span class="label">Descripción</span><span class="value">{{ data.description ?? '—' }}</span></div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-flat-button color="primary" type="button" (click)="close()">Cerrar</button>
</mat-dialog-actions>
