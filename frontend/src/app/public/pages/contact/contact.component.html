<section class="contact-page">
  <mat-card class="page-card">
    <mat-card-header>
      <div mat-card-avatar class="contact-avatar">
        <mat-icon>contact_mail</mat-icon>
      </div>
      <mat-card-title>Contacto</mat-card-title>
      <mat-card-subtitle>Hospital H&amp;H — canales oficiales</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p class="intro">Estamos para atenderle. Utilice los medios de contacto oficiales.</p>
      <mat-divider class="contact-divider" />
      <mat-list class="contact-list">
        <mat-list-item>
          <mat-icon matListItemIcon class="contact-list-icon">call</mat-icon>
          <div matListItemTitle>Teléfono</div>
          <div matListItemLine><a href="tel:+50200000000">+502 0000-0000</a></div>
        </mat-list-item>
        <mat-list-item>
          <mat-icon matListItemIcon class="contact-list-icon">email</mat-icon>
          <div matListItemTitle>Correo</div>
          <div matListItemLine><a href="mailto:contacto@hospitalhh.example">contacto&#64;hospitalhh.example</a></div>
        </mat-list-item>
        <mat-list-item>
          <mat-icon matListItemIcon class="contact-list-icon">place</mat-icon>
          <div matListItemTitle>Dirección</div>
          <div matListItemLine>Ciudad de Guatemala, Guatemala</div>
        </mat-list-item>
      </mat-list>
    </mat-card-content>
  </mat-card>
</section>
