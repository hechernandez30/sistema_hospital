<section class="services-page">
  <header class="page-header">
    <div class="page-header-text">
      <h1 class="page-title">Servicios</h1>
      <p class="page-lead">Soluciones integrales para su salud y la de su familia, con procesos claros y acompañamiento profesional.</p>
    </div>
  </header>

  <div class="services-grid">
    @if (services$ | async; as services) {
      @for (s of services; track s.id) {
        <mat-card class="svc-card" [id]="s.slug" [class.highlight]="highlightedId === s.slug">
        <mat-card-header>
          <div mat-card-avatar class="svc-avatar">
            <mat-icon>{{ iconFor(s.nombre) }}</mat-icon>
          </div>
          <mat-card-title>{{ s.nombre }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p>{{ s.descripcion }}</p>
        </mat-card-content>
        </mat-card>
      }
    }
  </div>
</section>
